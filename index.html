<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>  
    <div id="blur" class=""></div>
    <nav>
    <label for="addBook">Add book</label>
    <div onclick="form.classList.toggle('hidden'); blurred.classList.toggle('blur')" id="addBook" name="addBook" class="plusButton">+</div>
    
  </nav>
  
    <form class="hidden" action="">
      <fieldset> 
        <legend>Add a book</legend>
        <label for="name"></label><input name="name" placeholder="name" class="info" id="name" type="text">
        <label for="author"></label><input name="author" placeholder="author" class="info" id="author" type="text">
        <label for="pages"></label><input name="pages" placeholder="pages" class="info" id="pages" type="text">
        <label for="year"></label><input name="year" placeholder="release year" class="info" id="year" type="text">
      </fieldset>
      <button class="addBook" onclick="addBookToLibrary(); form.classList.toggle('hidden');blurred.classList.toggle('blur')">Add book</button>
    </form>
    <section>
      <div class="library"></div>
    </section>
    <script src="script.js"></script>
  </body>
</html>
